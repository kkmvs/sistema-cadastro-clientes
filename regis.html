<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://jsdelivr.net"></script>
    <title>Página de Registro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Preto Profundo */
            color: #e0e0e0; /* Cinza claro para texto */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .register-container {
            background-color: #1e1e1e; /* Cinza Escuro */
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #d32f2f; /* Detalhe em Vermelho */
        }

        h2 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0b0; /* Cinza médio */
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #d32f2f; /* Foco em Vermelho */
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background-color: #d32f2f; /* Vermelho */
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-register:hover {
            background-color: #b71c1c; /* Vermelho mais escuro no hover */
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }

        .footer-text a {
            color: #d32f2f;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- No seu Form, adicione o ID 'registerForm' e certifique-se de que os IDs dos inputs batam com o JS -->
<form id="registerForm">
    <div class="input-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" placeholder="Digite seu usuário" required>
    </div>
    <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
    </div>
    <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="********" required>
    </div>
    <button type="submit" class="btn-register">Registrar</button>
</form>

<script>
    // Inicialização correta (use 'supabase' em vez de 'supabaseClient' se preferir)
    const _supabaseUrl = 'https://cagohgxsuhsnkacwxevh.supabase.co';
    const _supabaseAnonKey = 'sb_publishable_CLajXLhrnani32ybIoae7w_PLrNFQ8J';
    const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseAnonKey);

    const registerForm = document.getElementById('registerForm');

    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Pegando os IDs corretos que estão no HTML
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { data, error } = await supabaseClient.auth.signUp({
            email: email,
            password: password,
            options: {
                data: {
                    display_name: username, // Salva o nome de usuário nos metadados
                }
            }
        });

        if (error) {
            alert('Erro ao registrar: ' + error.message);
        } else {
            alert('Cadastro realizado! Verifique seu e-mail.');
            console.log('Usuário criado:', data);
        }
    });
</script>


</body>
</html>
