<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://jsdelivr.net"></script>
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* Preto */
        }

        .contener {
            width: 420px;
            background-color: transparent;
            border: 2px solid brown;
            border-radius: 10px;
            color: #FFF;
            padding: 30px 40px;
            box-shadow: rgba(235, 235, 235, 0.35) 0px 5px 15px;
        }

        .mmn {
            position: relative;
            width: 100%;
            height: 50px;
            margin: 30px 0;
        }

        .mmn input {
            width: 100%;
            height: 100%;
            background-color: transparent;
            /* Adicionei uma borda para o input aparecer */
            border: 1px solid #FFF; 
            border-radius: 10px;
            outline: none;
            color: #FFF;
            font-size: 16px;
            padding: 0 15px; /* Espaço para o texto não colar na borda */
        }

        /* Efeito de foco no input */
        .mmn input:focus {
            border-color: brown;
        }

        .klk {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14.5px;
            margin: -15px 0 15px;
        }

        .klk label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .klk input[type="checkbox"] {
            accent-color: brown;
            margin-right: 5px;
        }

        .klk a {
            text-decoration: none;
            color: #FFF;
        }

        .klk a:hover {
            text-decoration: underline;
        }

        .lsl {
            width: 100%;
            height: 45px;
            margin-top: 20px;
        }

        .lsl button {
            width: 100%;
            height: 100%;
            background-color: brown;
            border: none;
            outline: none;
            border-radius: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            font-size: 16px;
            color: #FFF;
            font-weight: 600;
        }

        .register-link {
            font-size: 14.5px;
            text-align: center;
            margin: 20px 0 15px;
        }

        .register-link p a {
            color: #FFF;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link p a:hover {
            text-decoration: underline;
        }
        .junior a {
            font-size: 16px;
            padding: 10px 20px;
            border: 2px solid white;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            position: relative;
            left: 100px;
        }
        .junior a:hover {
            background-color: white;
            color: black;
        }
    </style>
</head>
<body>
    <main class="contener">
        <form action="">
            <h1 style="text-align: center; margin-bottom: 10px;">Login</h1>
            
            <div class="mmn">
                <input type="email" placeholder="Email" required>
            </div>
            
            <div class="mmn">
                <input type="password" placeholder="Senha" required>
            </div>
            
            <div class="klk">
                <label>
                    <input type="checkbox"> Lembrar senha
                </label>
                <a href="eqsen.html">Esqueci a senha</a>
            </div>
            
            <div class="lsl">
                <button type="submit">Login</button>
            </div>
            
            <div class="register-link">
                <p>Não tem conta? <a href="regis.html">Registre-se</a></p>    
            </div>
            <div class="junior">
                <a href="index.html">Voltar home</a>
            </div>
        </form>
    </main>
    <script>
const _supabaseUrl = 'https://cagohgxsuhsnkacwxevh.supabase.co';
const _supabaseAnonKey = 'sb_publishable_CLajXLhrnani32ybIoae7w_PLrNFQ8J';
const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseAnonKey);

// Seleciona o formulário
const loginForm = document.querySelector('form');

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault(); // Impede a página de recarregar

    // Pega os valores dos inputs
    const email = loginForm.querySelector('input[type="email"]').value;
    const password = loginForm.querySelector('input[type="password"]').value;

    // Tenta fazer o login no Supabase Auth
    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password,
    });

    if (error) {
        alert('Erro ao fazer login: ' + error.message);
    } else {
        alert('Login realizado com sucesso!');
        window.location.href = 'dashboard.html'; // Redireciona após o sucesso
    }
});
    </script>
</body>
</html>
