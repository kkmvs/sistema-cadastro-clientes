<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://fontawesome.com" crossorigin="anonymous"></script>
    <title>Contato</title>
    <style>
        /* Reset básico e centralização total */
        body {
            margin: 0;
            padding: 0;
            height: 100vh; /* Ocupa toda a altura da tela */
            background: radial-gradient(circle, #2c2c2c 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centraliza verticalmente o conteúdo principal */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden; /* Evita barras de rolagem desnecessárias */
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1; /* Garante que o conteúdo ocupe o centro entre o topo e o footer */
        }

        .text h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 25px; /* Mais espaço entre botões maiores */
        }

        .btn-style {
            border: 2px solid white; /* Borda um pouco mais grossa */
            border-radius: 20px;
            text-decoration: none;
            background-color: brown;
            color: white;
            width: 200px; 
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .btn-style:hover {
            box-shadow: 0 0 30px rgba(165, 42, 42, 0.6); /* Brilho marrom no hover */
            transform: scale(1.1); /* Efeito de crescimento */
            background-color: #8b0000; /* Marrom levemente mais escuro */
        }

        .btn-style i {
            font-size: 45px; /* Ícones maiores */
        }

        .btn-style span {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Footer fixo na base */
        footer {
            width: 100%;
            padding: 15px 0;
            background-color: #0a0a0a;
            border-top: 1px solid brown;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="text">
            <h1>Contatos</h1>
        </div>
        
        <div class="button-stack">
            <a class="btn-style" href="#">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a class="btn-style" href="#">
                <i class="fa-brands fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>
            <a class="btn-style" href="index.html">
                <i class="fa-solid fa-house"></i>
                <span>Início</span>
            </a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 | Todos os direitos reservados</p>
    </footer>

</body>
</html>
